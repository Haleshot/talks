<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" font-family="Inter, system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="wf-arrow-pink" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#FB6A76"/>
    </marker>
    <marker id="wf-arrow-pink-faded" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#FB6A76" fill-opacity="0.55"/>
    </marker>
    <marker id="wf-arrow-ink" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2A121B"/>
    </marker>
  </defs>

  <rect width="1200" height="760" fill="#FBF6E8"/>

  <!-- TITLE -->
  <text x="600" y="48" text-anchor="middle" fill="#2A121B" font-size="26" font-weight="800">
    The <tspan fill="#FB6A76" font-style="italic">webhook trap</tspan>: every consumer is its own integration
  </text>
  <text x="600" y="74" text-anchor="middle" fill="#532638" font-size="14" opacity="0.78">
    point-to-point hooks N×M your source-consumer matrix — and each pair re-implements the same broken machinery
  </text>

  <!-- ===== SOURCE (LEFT) ===== -->
  <g transform="translate(60,300)">
    <rect width="200" height="100" rx="18" fill="#FCF3D8" stroke="#2A121B" stroke-width="2.5"/>
    <text x="100" y="36" text-anchor="middle" fill="#532638" font-size="11" font-weight="800" letter-spacing="3">SOURCE</text>
    <text x="100" y="68" text-anchor="middle" fill="#2A121B" font-size="22" font-weight="800">Notion</text>
    <text x="100" y="88" text-anchor="middle" fill="#532638" font-size="11" opacity="0.7">(× repeat for every other source)</text>
  </g>

  <!-- burst dots above source -->
  <g fill="#FB6A76">
    <circle cx="80" cy="270" r="3.5"/>
    <circle cx="100" cy="262" r="3.5"/>
    <circle cx="124" cy="258" r="4.5"/>
    <circle cx="150" cy="262" r="3.5"/>
    <circle cx="176" cy="270" r="3.5"/>
    <circle cx="208" cy="276" r="4"/>
    <circle cx="240" cy="282" r="3"/>
  </g>
  <text x="160" y="246" text-anchor="middle" fill="#FB6A76" font-size="11" font-weight="700" letter-spacing="2">BURST OF EDITS</text>

  <!-- ===== CONSUMERS (RIGHT) ===== -->
  <g font-size="15" fill="#2A121B" font-weight="700">
    <g transform="translate(960,150)">
      <rect width="180" height="56" rx="14" fill="#E59A63" stroke="#2A121B" stroke-width="2"/>
      <text x="90" y="34" text-anchor="middle">vector index</text>
    </g>
    <g transform="translate(960,260)">
      <rect width="180" height="56" rx="14" fill="#E59A63" stroke="#2A121B" stroke-width="2"/>
      <text x="90" y="34" text-anchor="middle">agent runtime</text>
    </g>
    <g transform="translate(960,370)">
      <rect width="180" height="56" rx="14" fill="#E59A63" stroke="#2A121B" stroke-width="2"/>
      <text x="90" y="34" text-anchor="middle">search backend</text>
    </g>
    <g transform="translate(960,480)">
      <rect width="180" height="56" rx="14" fill="#E59A63" stroke="#2A121B" stroke-width="2"/>
      <text x="90" y="34" text-anchor="middle">BI / analytics</text>
    </g>
  </g>

  <!-- ===== WEBHOOK SPAGHETTI (4 arrows w/ different payload schemas + duplicated machinery chips) ===== -->
  <!-- arrow 1 -->
  <path d="M 260 320 C 480 320, 720 178, 956 178" stroke="#FB6A76" stroke-width="2.2" fill="none" marker-end="url(#wf-arrow-pink)"/>
  <!-- arrow 2 -->
  <path d="M 260 340 C 500 340, 720 288, 956 288" stroke="#FB6A76" stroke-width="2.2" fill="none" marker-end="url(#wf-arrow-pink)"/>
  <!-- arrow 3 -->
  <path d="M 260 360 C 500 360, 720 398, 956 398" stroke="#FB6A76" stroke-width="2.2" fill="none" marker-end="url(#wf-arrow-pink)"/>
  <!-- arrow 4 -->
  <path d="M 260 380 C 480 380, 720 508, 956 508" stroke="#FB6A76" stroke-width="2.2" fill="none" marker-end="url(#wf-arrow-pink)"/>

  <!-- payload labels on each arrow (different schema per pair) -->
  <g font-family="ui-monospace, SFMono-Regular, monospace" font-size="11" fill="#2A121B">
    <g transform="translate(420,234)">
      <rect x="-58" y="-14" width="116" height="22" rx="6" fill="#FBF6E8" stroke="#FB6A76" stroke-width="1.2"/>
      <text x="0" y="2" text-anchor="middle">POST {note:…}</text>
    </g>
    <g transform="translate(560,304)">
      <rect x="-62" y="-14" width="124" height="22" rx="6" fill="#FBF6E8" stroke="#FB6A76" stroke-width="1.2"/>
      <text x="0" y="2" text-anchor="middle">PUT &lt;edit&gt;…</text>
    </g>
    <g transform="translate(560,406)">
      <rect x="-66" y="-14" width="132" height="22" rx="6" fill="#FBF6E8" stroke="#FB6A76" stroke-width="1.2"/>
      <text x="0" y="2" text-anchor="middle">POST {payload}</text>
    </g>
    <g transform="translate(420,478)">
      <rect x="-62" y="-14" width="124" height="22" rx="6" fill="#FBF6E8" stroke="#FB6A76" stroke-width="1.2"/>
      <text x="0" y="2" text-anchor="middle">GET ?changed</text>
    </g>
  </g>

  <!-- duplicated "machinery" chip on each arrow — the durable-log pieces being reinvented -->
  <g font-size="10" font-weight="700" fill="#532638" letter-spacing="0.5">
    <g transform="translate(770,180)">
      <rect x="-78" y="-12" width="156" height="22" rx="11" fill="#FCF3D8" stroke="#532638" stroke-width="1"/>
      <text x="0" y="3" text-anchor="middle">retry · dedup · queue · ack</text>
    </g>
    <g transform="translate(770,290)">
      <rect x="-78" y="-12" width="156" height="22" rx="11" fill="#FCF3D8" stroke="#532638" stroke-width="1"/>
      <text x="0" y="3" text-anchor="middle">retry · dedup · queue · ack</text>
    </g>
    <g transform="translate(770,400)">
      <rect x="-78" y="-12" width="156" height="22" rx="11" fill="#FCF3D8" stroke="#532638" stroke-width="1"/>
      <text x="0" y="3" text-anchor="middle">retry · dedup · queue · ack</text>
    </g>
    <g transform="translate(770,510)">
      <rect x="-78" y="-12" width="156" height="22" rx="11" fill="#FCF3D8" stroke="#532638" stroke-width="1"/>
      <text x="0" y="3" text-anchor="middle">retry · dedup · queue · ack</text>
    </g>
  </g>

  <!-- bracket linking the 4 chips to call out duplication -->
  <path d="M 700 168 L 690 168 L 690 522 L 700 522" stroke="#FB6A76" stroke-width="1.8" fill="none" stroke-dasharray="4 4"/>
  <g transform="translate(550,345)">
    <rect x="-130" y="-18" width="260" height="36" rx="18" fill="#FB6A76" fill-opacity="0.12" stroke="#FB6A76" stroke-width="1.6"/>
    <text x="0" y="-2" text-anchor="middle" fill="#FB6A76" font-size="11" font-weight="800" letter-spacing="2">EACH PAIR RE-INVENTS</text>
    <text x="0" y="14" text-anchor="middle" fill="#532638" font-size="11" font-weight="600">pieces of a durable log</text>
  </g>

  <!-- ===== ANNOTATIONS — the four named failure modes ===== -->

  <!-- 1. NO BUFFER (top of source) -->
  <g transform="translate(60,150)">
    <rect width="260" height="60" rx="14" fill="#FB6A76" fill-opacity="0.14" stroke="#FB6A76" stroke-width="1.6"/>
    <text x="20" y="26" fill="#FB6A76" font-size="11" font-weight="800" letter-spacing="2">NO BUFFER</text>
    <text x="20" y="46" fill="#2A121B" font-size="12">bursts drop or flood downstream</text>
  </g>
  <path d="M 190 210 L 165 248" stroke="#FB6A76" stroke-width="1.6" fill="none" stroke-dasharray="3 4" marker-end="url(#wf-arrow-pink-faded)"/>

  <!-- 2. NO SHARED SCHEMA (lower left, points up at payload chips) -->
  <g transform="translate(310,580)">
    <rect width="320" height="60" rx="14" fill="#FB6A76" fill-opacity="0.14" stroke="#FB6A76" stroke-width="1.6"/>
    <text x="20" y="26" fill="#FB6A76" font-size="11" font-weight="800" letter-spacing="2">NO SHARED SCHEMA</text>
    <text x="20" y="46" fill="#2A121B" font-size="12">every pair invents its own "change" shape</text>
  </g>
  <path d="M 470 580 L 470 495" stroke="#FB6A76" stroke-width="1.6" fill="none" stroke-dasharray="3 4" marker-end="url(#wf-arrow-pink-faded)"/>

  <!-- 3. NO REPLAY (right side — late consumer arrives) -->
  <g transform="translate(960,600)">
    <rect width="180" height="56" rx="14" fill="#FCF3D8" stroke="#2A121B" stroke-width="2" stroke-dasharray="5 4"/>
    <text x="90" y="22" text-anchor="middle" fill="#532638" font-size="10" font-weight="800" letter-spacing="2">NEW CONSUMER</text>
    <text x="90" y="42" text-anchor="middle" fill="#2A121B" font-size="13" font-weight="700">just plugged in →</text>
  </g>
  <!-- ghost arrow trying to reach into the past -->
  <path d="M 1010 600 C 980 580, 880 560, 800 558" stroke="#FB6A76" stroke-width="1.6" fill="none" stroke-dasharray="3 5" opacity="0.7" marker-end="url(#wf-arrow-pink-faded)"/>
  <g transform="translate(800,684)">
    <rect x="-150" y="-22" width="300" height="44" rx="14" fill="#FB6A76" fill-opacity="0.14" stroke="#FB6A76" stroke-width="1.6"/>
    <text x="0" y="-3" text-anchor="middle" fill="#FB6A76" font-size="11" font-weight="800" letter-spacing="2">NO REPLAY / NO BACKFILL</text>
    <text x="0" y="14" text-anchor="middle" fill="#2A121B" font-size="12">history is gone — sees only edits from now on</text>
  </g>

  <!-- ===== FOOTER ===== -->
  <g transform="translate(600,734)">
    <rect x="-380" y="-22" width="760" height="40" rx="20" fill="#2A121B"/>
    <text y="5" text-anchor="middle" fill="#FCF3D8" font-size="13" font-weight="600" letter-spacing="0.4">
      <tspan fill="#E59A63" font-weight="800">A durable log</tspan> solves all four at once — buffer, schema, replay, and one shared integration.
    </text>
  </g>
</svg>
