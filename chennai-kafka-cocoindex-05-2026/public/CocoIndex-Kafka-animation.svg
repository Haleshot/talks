<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 460" font-family="Inter, system-ui, -apple-system, sans-serif" role="img" aria-label="Three unstructured sources — meeting notes, codebase, files — feed CocoIndex and land on a Kafka topic as (key, value) upsert / delete / no-op events">
  <defs>
    <marker id="arrow-coral3" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#BE5133"/>
    </marker>
  </defs>
  <rect width="1200" height="460" fill="#FBF6E8"/>

  <!-- TITLE -->
  <text x="600" y="46" text-anchor="middle" fill="#2A121B" font-size="22" font-weight="800">
    <tspan fill="#BE5133" font-style="italic">CocoIndex</tspan>: unstructured CDC, straight onto Kafka
  </text>

  <!-- LIVE badge -->
  <g transform="translate(1060,30)">
    <rect x="0" y="0" width="80" height="28" rx="14" fill="#FBF6E8" stroke="#16A534" stroke-width="1.5"/>
    <circle cx="16" cy="14" r="5" fill="#16A534">
      <animate attributeName="opacity" values="1;0.25;1" dur="1.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="16" cy="14" r="5" fill="#16A534" opacity="0.4">
      <animate attributeName="r" values="5;12;5" dur="1.2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.5;0;0.5" dur="1.2s" repeatCount="indefinite"/>
    </circle>
    <text x="48" y="19" text-anchor="middle" fill="#16A534" font-size="12" font-weight="800" letter-spacing="2">LIVE</text>
  </g>

  <!-- SOURCES eyebrow -->
  <text x="160" y="92" text-anchor="middle" fill="#532638" font-size="11" font-weight="800" letter-spacing="3">SOURCES · INCREMENTAL</text>

  <!-- 3 source pills (title-only) -->
  <g font-size="16" fill="#2A121B" font-weight="700">
    <g transform="translate(40,116)">
      <rect width="240" height="64" rx="32" fill="#FCF3D8" stroke="#532638" stroke-width="2"/>
      <text x="120" y="40" text-anchor="middle">meeting notes</text>
    </g>
    <g transform="translate(40,200)">
      <rect width="240" height="64" rx="32" fill="#FCF3D8" stroke="#532638" stroke-width="2"/>
      <text x="120" y="40" text-anchor="middle">codebase</text>
    </g>
    <g transform="translate(40,284)">
      <rect width="240" height="64" rx="32" fill="#FCF3D8" stroke="#532638" stroke-width="2"/>
      <text x="120" y="40" text-anchor="middle">files</text>
    </g>
  </g>

  <!-- arrows source -> CocoIndex (centered around CocoIndex y=232) -->
  <g stroke="#BE5133" stroke-width="2.5" fill="none" marker-end="url(#arrow-coral3)">
    <path d="M 280 148 C 350 148, 380 200, 438 218"/>
    <path d="M 280 232 L 438 232"/>
    <path d="M 280 316 C 350 316, 380 264, 438 246"/>
  </g>

  <!-- CocoIndex box (center y = 232) -->
  <g transform="translate(440,177)">
    <rect width="220" height="110" rx="14" fill="#2A121B"/>
    <text x="110" y="58" text-anchor="middle" fill="#FCF3D8" font-size="26" font-weight="800">CocoIndex</text>
    <text x="110" y="82" text-anchor="middle" fill="#FCF3D8" font-size="11" opacity="0.78">what changed since last time?</text>
  </g>

  <!-- (key, value) pill ABOVE the arrow -->
  <g transform="translate(708,196)">
    <rect width="124" height="26" rx="13" fill="#FBF6E8" stroke="#BE5133" stroke-width="1.5"/>
    <text x="62" y="18" text-anchor="middle" fill="#BE5133" font-size="12" font-weight="700">(key, value)</text>
  </g>

  <!-- arrow CocoIndex -> Kafka -->
  <g stroke="#BE5133" stroke-width="2.5" fill="none" marker-end="url(#arrow-coral3)">
    <path d="M 660 232 L 898 232"/>
  </g>

  <!-- staggered green dots, CocoIndex -> Kafka -->
  <circle r="6" fill="#16A534">
    <animateMotion dur="1.6s" repeatCount="indefinite" path="M 660 232 L 890 232"/>
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.08;0.9;1" dur="1.6s" repeatCount="indefinite"/>
  </circle>
  <circle r="6" fill="#16A534">
    <animateMotion dur="1.6s" begin="0.55s" repeatCount="indefinite" path="M 660 232 L 890 232"/>
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.08;0.9;1" dur="1.6s" begin="0.55s" repeatCount="indefinite"/>
  </circle>
  <circle r="6" fill="#16A534">
    <animateMotion dur="1.6s" begin="1.1s" repeatCount="indefinite" path="M 660 232 L 890 232"/>
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.08;0.9;1" dur="1.6s" begin="1.1s" repeatCount="indefinite"/>
  </circle>

  <!-- UPSERT · DELETE · NO-OP label -->
  <text x="780" y="266" text-anchor="middle" fill="#532638" font-size="11" font-weight="700" letter-spacing="3" opacity="0.8">UPSERT · DELETE · NO-OP</text>

  <!-- KAFKA pipe -->
  <g transform="translate(900,187)">
    <rect width="280" height="90" rx="14" fill="#2A121B"/>
    <text x="140" y="35" text-anchor="middle" fill="#E59A63" font-size="11" font-weight="700" letter-spacing="3" opacity="0.85">TOPIC LOG</text>
    <text x="140" y="68" text-anchor="middle" fill="#FCF3D8" font-size="28" font-weight="800" letter-spacing="2">KAFKA</text>
  </g>

  <!-- Subtitle -->
  <text x="600" y="420" text-anchor="middle" fill="#532638" font-size="13" font-style="italic" opacity="0.85">
    only changed rows produce messages — Δ becomes a Kafka event, ✓ stays silent.
  </text>
</svg>
