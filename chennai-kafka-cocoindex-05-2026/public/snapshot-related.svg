<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 820" font-family="Inter, system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="ceb-arrow-coral" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#BE5133"/>
    </marker>
    <marker id="ceb-arrow-sage" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#16A534"/>
    </marker>
    <marker id="ceb-arrow-ink" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2A121B"/>
    </marker>
  </defs>

  <rect width="1200" height="820" fill="#FBF6E8"/>

  <!-- TITLE -->
  <text x="600" y="44" text-anchor="middle" fill="#2A121B" font-size="26" font-weight="800">
    From snapshot to a <tspan fill="#16A534" font-style="italic">change-event backbone</tspan>
  </text>
  <text x="600" y="72" text-anchor="middle" fill="#532638" font-size="14" opacity="0.78">
    Drives, repos, wikis, PDFs — published as change events to the same log that already carries orders, clicks, and CDC
  </text>

  <!-- ===== FLOW DIAGRAM (y 100 - 460) ===== -->

  <!-- column headers -->
  <text x="130" y="118" text-anchor="middle" fill="#16A534" font-size="11" font-weight="800" letter-spacing="3">UNSTRUCTURED SOURCES</text>
  <text x="330" y="118" text-anchor="middle" fill="#532638" font-size="11" font-weight="800" letter-spacing="3">DIFF</text>
  <text x="700" y="118" text-anchor="middle" fill="#E59A63" font-size="11" font-weight="800" letter-spacing="3">DURABLE LOG</text>
  <text x="1070" y="118" text-anchor="middle" fill="#BE5133" font-size="11" font-weight="800" letter-spacing="3">EVERY CONSUMER</text>

  <!-- SOURCE PILLS (left column) -->
  <g font-size="13" fill="#2A121B" font-weight="600">
    <g transform="translate(40,140)">
      <rect width="180" height="38" rx="19" fill="#FCF3D8" stroke="#2A121B" stroke-width="2"/>
      <text x="90" y="24" text-anchor="middle">Drives</text>
    </g>
    <g transform="translate(40,186)">
      <rect width="180" height="38" rx="19" fill="#FCF3D8" stroke="#2A121B" stroke-width="2"/>
      <text x="90" y="24" text-anchor="middle">Repos</text>
    </g>
    <g transform="translate(40,232)">
      <rect width="180" height="38" rx="19" fill="#FCF3D8" stroke="#2A121B" stroke-width="2"/>
      <text x="90" y="24" text-anchor="middle">Design files</text>
    </g>
    <g transform="translate(40,278)">
      <rect width="180" height="38" rx="19" fill="#FCF3D8" stroke="#2A121B" stroke-width="2"/>
      <text x="90" y="24" text-anchor="middle">Wikis</text>
    </g>
    <g transform="translate(40,324)">
      <rect width="180" height="38" rx="19" fill="#FCF3D8" stroke="#2A121B" stroke-width="2"/>
      <text x="90" y="24" text-anchor="middle">PDFs</text>
    </g>
    <g transform="translate(40,370)">
      <rect width="180" height="38" rx="19" fill="#FCF3D8" stroke="#2A121B" stroke-width="2"/>
      <text x="90" y="24" text-anchor="middle">File shares</text>
    </g>
  </g>

  <!-- arrows from sources into CocoIndex -->
  <g stroke="#BE5133" stroke-width="2" fill="none" marker-end="url(#ceb-arrow-coral)">
    <path d="M 220 159 C 252 159, 256 230, 268 254"/>
    <path d="M 220 205 C 252 205, 258 240, 268 264"/>
    <path d="M 220 251 C 248 251, 256 260, 268 274"/>
    <path d="M 220 297 C 248 297, 258 290, 268 284"/>
    <path d="M 220 343 C 250 343, 258 304, 268 294"/>
    <path d="M 220 389 C 252 389, 258 314, 268 304"/>
  </g>

  <!-- COCOINDEX BOX -->
  <g transform="translate(270,160)">
    <rect width="140" height="240" rx="16" fill="#FCF3D8" stroke="#2A121B" stroke-width="2.5"/>
    <text x="70" y="40" text-anchor="middle" fill="#2A121B" font-size="18" font-weight="800">CocoIndex</text>
    <line x1="22" y1="56" x2="118" y2="56" stroke="#2A121B" stroke-width="1" opacity="0.3"/>
    <text x="70" y="80" text-anchor="middle" fill="#532638" font-size="11" font-weight="600">diff vs. prior state</text>
    <text x="70" y="98" text-anchor="middle" fill="#532638" font-size="11" font-weight="600">only changed rows</text>

    <!-- visual: 4 rows, one highlighted as Δ -->
    <g transform="translate(20,118)">
      <rect width="100" height="14" rx="3" fill="#FBF6E8" stroke="#2A121B" stroke-width="1" opacity="0.5"/>
      <rect y="20" width="100" height="14" rx="3" fill="#16A534" fill-opacity="0.18" stroke="#16A534" stroke-width="1.5"/>
      <text x="50" y="31" text-anchor="middle" fill="#16A534" font-size="10" font-weight="800">Δ changed</text>
      <rect y="40" width="100" height="14" rx="3" fill="#FBF6E8" stroke="#2A121B" stroke-width="1" opacity="0.5"/>
      <rect y="60" width="100" height="14" rx="3" fill="#FBF6E8" stroke="#2A121B" stroke-width="1" opacity="0.5"/>
    </g>

    <text x="70" y="218" text-anchor="middle" fill="#16A534" font-size="11" font-weight="800" letter-spacing="2">EMIT ONLY Δ</text>
  </g>

  <!-- arrow CocoIndex → spine -->
  <path d="M 410 280 L 446 280" stroke="#16A534" stroke-width="3" fill="none" marker-end="url(#ceb-arrow-sage)"/>
  <text x="428" y="270" text-anchor="middle" fill="#16A534" font-size="10" font-weight="800" letter-spacing="2">Δ</text>

  <!-- ===== TOPIC SPINE (horizontal) ===== -->
  <g transform="translate(450,240)">
    <rect width="500" height="80" rx="40" fill="#2A121B"/>
    <text x="250" y="32" text-anchor="middle" fill="#E59A63" font-size="11" font-weight="700" letter-spacing="3" opacity="0.85">TOPIC · DURABLE · ORDERED · REPLAYABLE</text>
    <text x="250" y="58" text-anchor="middle" fill="#FCF3D8" font-size="22" font-weight="800" letter-spacing="2">KAFKA TOPIC</text>
  </g>

  <!-- offset/timestamp ticks BELOW the spine — visualizes audit trail -->
  <g font-family="ui-monospace, SFMono-Regular, monospace" font-size="9" fill="#532638">
    <line x1="500" y1="320" x2="500" y2="332" stroke="#532638" stroke-width="1.5"/>
    <text x="500" y="346" text-anchor="middle" font-weight="700">#0108</text>
    <text x="500" y="358" text-anchor="middle" opacity="0.7">09:14:21</text>

    <line x1="580" y1="320" x2="580" y2="332" stroke="#532638" stroke-width="1.5"/>
    <text x="580" y="346" text-anchor="middle" font-weight="700">#0109</text>
    <text x="580" y="358" text-anchor="middle" opacity="0.7">09:14:22</text>

    <line x1="660" y1="320" x2="660" y2="332" stroke="#532638" stroke-width="1.5"/>
    <text x="660" y="346" text-anchor="middle" font-weight="700">#0110</text>
    <text x="660" y="358" text-anchor="middle" opacity="0.7">09:14:23</text>

    <line x1="740" y1="320" x2="740" y2="332" stroke="#532638" stroke-width="1.5"/>
    <text x="740" y="346" text-anchor="middle" font-weight="700">#0111</text>
    <text x="740" y="358" text-anchor="middle" opacity="0.7">09:14:23</text>

    <line x1="820" y1="320" x2="820" y2="332" stroke="#532638" stroke-width="1.5"/>
    <text x="820" y="346" text-anchor="middle" font-weight="700">#0112</text>
    <text x="820" y="358" text-anchor="middle" opacity="0.7">09:14:24</text>

    <line x1="900" y1="320" x2="900" y2="332" stroke="#532638" stroke-width="1.5"/>
    <text x="900" y="346" text-anchor="middle" font-weight="700">#0113</text>
    <text x="900" y="358" text-anchor="middle" opacity="0.7">09:14:25</text>
  </g>

  <!-- arrows from spine fanning OUT to each consumer -->
  <g stroke="#BE5133" stroke-width="2" fill="none" marker-end="url(#ceb-arrow-coral)">
    <path d="M 952 264 C 970 200, 956 158, 978 158"/>
    <path d="M 952 270 C 970 218, 956 204, 978 204"/>
    <path d="M 952 276 C 970 240, 956 250, 978 250"/>
    <path d="M 952 282 C 970 282, 956 296, 978 296"/>
    <path d="M 952 290 C 970 320, 956 342, 978 342"/>
    <path d="M 952 296 C 970 360, 956 388, 978 388"/>
  </g>

  <!-- CONSUMER PILLS (right column) -->
  <g font-size="13" fill="#2A121B" font-weight="600">
    <g transform="translate(980,140)">
      <rect width="180" height="38" rx="19" fill="#E59A63" stroke="#2A121B" stroke-width="2"/>
      <text x="90" y="24" text-anchor="middle">vector index</text>
    </g>
    <g transform="translate(980,186)">
      <rect width="180" height="38" rx="19" fill="#E59A63" stroke="#2A121B" stroke-width="2"/>
      <text x="90" y="24" text-anchor="middle">agent runtime</text>
    </g>
    <g transform="translate(980,232)">
      <rect width="180" height="38" rx="19" fill="#E59A63" stroke="#2A121B" stroke-width="2"/>
      <text x="90" y="24" text-anchor="middle">search</text>
    </g>
    <g transform="translate(980,278)">
      <rect width="180" height="38" rx="19" fill="#E59A63" stroke="#2A121B" stroke-width="2"/>
      <text x="90" y="24" text-anchor="middle">Flink job</text>
    </g>
    <g transform="translate(980,324)">
      <rect width="180" height="38" rx="19" fill="#E59A63" stroke="#2A121B" stroke-width="2"/>
      <text x="90" y="24" text-anchor="middle">BI tile</text>
    </g>
    <g transform="translate(980,370)">
      <rect width="180" height="38" rx="19" fill="#E59A63" stroke="#2A121B" stroke-width="2"/>
      <text x="90" y="24" text-anchor="middle">compliance tool</text>
    </g>
  </g>

  <!-- NEW SUBSCRIBER (dashed) below consumer column -->
  <g transform="translate(980,425)">
    <rect width="180" height="42" rx="14" fill="#FBF6E8" stroke="#2A121B" stroke-width="2" stroke-dasharray="5 4"/>
    <text x="90" y="18" text-anchor="middle" fill="#532638" font-size="9" font-weight="800" letter-spacing="2">NEW SUBSCRIBER</text>
    <text x="90" y="34" text-anchor="middle" fill="#2A121B" font-size="12" font-weight="700">joins later — replays</text>
  </g>

  <!-- REPLAY arrow: from new subscriber back to start of spine -->
  <path d="M 980 446 C 760 446, 500 420, 460 360" stroke="#16A534" stroke-width="2" fill="none" stroke-dasharray="5 4" marker-end="url(#ceb-arrow-sage)"/>
  <g transform="translate(700,448)">
    <rect x="-86" y="-12" width="172" height="22" rx="11" fill="#FBF6E8" stroke="#16A534" stroke-width="1.5"/>
    <text x="0" y="3" text-anchor="middle" fill="#16A534" font-size="10" font-weight="800" letter-spacing="2">REPLAY FROM #0001</text>
  </g>

  <!-- divider -->
  <line x1="40" y1="495" x2="1160" y2="495" stroke="#532638" stroke-width="1" stroke-dasharray="3 6" opacity="0.4"/>
  <g transform="translate(600,495)">
    <rect x="-130" y="-12" width="260" height="24" rx="12" fill="#FBF6E8"/>
    <text y="5" text-anchor="middle" fill="#532638" font-size="11" font-weight="800" letter-spacing="3" opacity="0.85">FIVE BENEFITS OF THE BACKBONE</text>
  </g>

  <!-- ===== 5 BENEFIT CARDS (y 525 - 770) ===== -->

  <!-- Card 1 -->
  <g transform="translate(20,535)">
    <rect width="224" height="220" rx="14" fill="#FCF3D8" stroke="#532638" stroke-width="1.5"/>
    <circle cx="32" cy="32" r="18" fill="#2A121B"/>
    <text x="32" y="38" text-anchor="middle" fill="#FCF3D8" font-size="16" font-weight="800">1</text>
    <text x="64" y="38" fill="#2A121B" font-size="13" font-weight="800">EFFICIENT AI</text>
    <text x="20" y="86" fill="#2A121B" font-size="12" font-weight="700">Refresh only on change.</text>
    <text x="20" y="116" fill="#532638" font-size="11">Embeddings, retrievals,</text>
    <text x="20" y="132" fill="#532638" font-size="11">and agent context</text>
    <text x="20" y="148" fill="#532638" font-size="11">recompute only when</text>
    <text x="20" y="164" fill="#532638" font-size="11">something actually</text>
    <text x="20" y="180" fill="#532638" font-size="11">changed — less work,</text>
    <text x="20" y="196" fill="#532638" font-size="11">fresher results.</text>
  </g>

  <!-- Card 2 -->
  <g transform="translate(256,535)">
    <rect width="224" height="220" rx="14" fill="#FCF3D8" stroke="#532638" stroke-width="1.5"/>
    <circle cx="32" cy="32" r="18" fill="#2A121B"/>
    <text x="32" y="38" text-anchor="middle" fill="#FCF3D8" font-size="16" font-weight="800">2</text>
    <text x="64" y="38" fill="#2A121B" font-size="13" font-weight="800">FAN-OUT</text>
    <text x="20" y="86" fill="#2A121B" font-size="12" font-weight="700">One change reaches</text>
    <text x="20" y="102" fill="#2A121B" font-size="12" font-weight="700">every consumer.</text>
    <text x="20" y="132" fill="#532638" font-size="11">A Notion edit updates</text>
    <text x="20" y="148" fill="#532638" font-size="11">the vector index, alerts</text>
    <text x="20" y="164" fill="#532638" font-size="11">an agent, refreshes</text>
    <text x="20" y="180" fill="#532638" font-size="11">search, feeds Flink, and</text>
    <text x="20" y="196" fill="#532638" font-size="11">lands in BI — decoupled.</text>
  </g>

  <!-- Card 3 -->
  <g transform="translate(492,535)">
    <rect width="224" height="220" rx="14" fill="#FCF3D8" stroke="#532638" stroke-width="1.5"/>
    <circle cx="32" cy="32" r="18" fill="#2A121B"/>
    <text x="32" y="38" text-anchor="middle" fill="#FCF3D8" font-size="16" font-weight="800">3</text>
    <text x="64" y="38" fill="#2A121B" font-size="13" font-weight="800">EXTENSIBLE</text>
    <text x="20" y="86" fill="#2A121B" font-size="12" font-weight="700">Add subscribers later.</text>
    <text x="20" y="116" fill="#532638" font-size="11">A new agent, a rebuilt</text>
    <text x="20" y="132" fill="#532638" font-size="11">RAG layer, or a compli-</text>
    <text x="20" y="148" fill="#532638" font-size="11">ance tool can subscribe</text>
    <text x="20" y="164" fill="#532638" font-size="11">to the topic and replay</text>
    <text x="20" y="180" fill="#532638" font-size="11">history — same view as</text>
    <text x="20" y="196" fill="#532638" font-size="11">consumers from day one.</text>
  </g>

  <!-- Card 4 -->
  <g transform="translate(728,535)">
    <rect width="224" height="220" rx="14" fill="#FCF3D8" stroke="#532638" stroke-width="1.5"/>
    <circle cx="32" cy="32" r="18" fill="#2A121B"/>
    <text x="32" y="38" text-anchor="middle" fill="#FCF3D8" font-size="16" font-weight="800">4</text>
    <text x="64" y="38" fill="#2A121B" font-size="13" font-weight="800">AUDITABLE</text>
    <text x="20" y="86" fill="#2A121B" font-size="12" font-weight="700">Offsets + timestamps</text>
    <text x="20" y="102" fill="#2A121B" font-size="12" font-weight="700">are evidence.</text>
    <text x="20" y="132" fill="#532638" font-size="11">"Did the agent see</text>
    <text x="20" y="148" fill="#532638" font-size="11">the updated policy</text>
    <text x="20" y="164" fill="#532638" font-size="11">before it acted?" gets</text>
    <text x="20" y="180" fill="#532638" font-size="11">a concrete answer from</text>
    <text x="20" y="196" fill="#532638" font-size="11">the durable log.</text>
  </g>

  <!-- Card 5 -->
  <g transform="translate(964,535)">
    <rect width="216" height="220" rx="14" fill="#FCF3D8" stroke="#532638" stroke-width="1.5"/>
    <circle cx="32" cy="32" r="18" fill="#2A121B"/>
    <text x="32" y="38" text-anchor="middle" fill="#FCF3D8" font-size="16" font-weight="800">5</text>
    <text x="64" y="38" fill="#2A121B" font-size="13" font-weight="800">STABLE CONTRACT</text>
    <text x="20" y="86" fill="#2A121B" font-size="12" font-weight="700">Schema on the wire.</text>
    <text x="20" y="116" fill="#532638" font-size="11">Sources, detectors, and</text>
    <text x="20" y="132" fill="#532638" font-size="11">models can evolve</text>
    <text x="20" y="148" fill="#532638" font-size="11">independently. The</text>
    <text x="20" y="164" fill="#532638" font-size="11">change-event format on</text>
    <text x="20" y="180" fill="#532638" font-size="11">the topic is the stable</text>
    <text x="20" y="196" fill="#532638" font-size="11">interface in between.</text>
  </g>

  <!-- FOOTER -->
  <g transform="translate(600,790)">
    <rect x="-440" y="-22" width="880" height="40" rx="20" fill="#2A121B"/>
    <text y="5" text-anchor="middle" fill="#FCF3D8" font-size="13" font-weight="600" letter-spacing="0.4">
      The same backbone that already carries <tspan fill="#E59A63" font-weight="800">orders, clicks, and CDC</tspan> — now extended to unstructured data.
    </text>
  </g>
</svg>
